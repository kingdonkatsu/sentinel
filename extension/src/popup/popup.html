<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #1e293b;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 11px; color: #94a3b8; }
    label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
      margin-top: 14px;
    }
    input, select {
      width: 100%;
      padding: 8px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    .slider-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type="range"] {
      flex: 1;
      padding: 0;
      accent-color: #3b82f6;
    }
    .slider-value {
      font-size: 13px;
      font-weight: 600;
      min-width: 32px;
      text-align: right;
    }
    .weight-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 8px;
      color: #22c55e;
      display: none;
    }
    .privacy-note {
      margin-top: 16px;
      padding: 10px;
      background: #1e293b;
      border-radius: 8px;
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
    }
    .privacy-note strong { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <div>
      <div class="title">Sentinel</div>
      <div class="subtitle">Privacy-First Mental Health Triage</div>
    </div>
  </div>

  <label for="apiUrl">API URL</label>
  <input type="text" id="apiUrl" placeholder="http://localhost:8000">

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="Enter your API key">

  <label for="threshold">Risk Threshold</label>
  <div class="slider-container">
    <input type="range" id="threshold" min="30" max="95" value="70">
    <span class="slider-value" id="thresholdValue">70</span>
  </div>

  <label>Score Weights</label>
  <div class="slider-container">
    <span style="font-size:12px;color:#94a3b8;">Image</span>
    <input type="range" id="imageWeight" min="0" max="100" value="50">
    <span style="font-size:12px;color:#94a3b8;">Text</span>
  </div>
  <div class="weight-row">
    <span id="imageWeightValue">50%</span>
    <span id="textWeightValue">50%</span>
  </div>

  <button id="saveBtn">Save Configuration</button>
  <div class="status" id="status">Settings saved!</div>

  <div class="privacy-note">
    <strong>Privacy:</strong> Sentinel analyses content in your browser only.
    No images, text, or personal data ever leave your device.
    Only anonymised risk scores are transmitted.
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
